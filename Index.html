<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binice</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>BINICE</h1>

</header>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
